services:
  postgres:
    image: postgres:16-alpine
    container_name: xp65-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - xp65-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xp65-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: xp65-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - xp65-grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xp65-network

  ingester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xp65-ingester
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      LOGS_DIR: /logs
      INGEST_MAX_FILES: ${INGEST_MAX_FILES}
    volumes:
      - ${LOGS_SOURCE}:/logs:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xp65-network

volumes:
  xp65-postgres-data:
  xp65-grafana-data:

networks:
  xp65-network:
    driver: bridge
